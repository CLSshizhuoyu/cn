<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名言展示器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            line-height: 1.6;
            padding: 50px 20px;
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #00ffee;
            margin-bottom: 50px;
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 238, 0.5));
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 8px rgba(0, 255, 238, 0.5)); }
            to { filter: drop-shadow(0 0 15px rgba(0, 255, 238, 0.8)); }
        }

        .section {
            background: rgba(30, 30, 30, 0.9);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .section:hover {
            transform: translateY(-18px);
            box-shadow: 0 25px 50px rgba(0, 255, 238, 0.4);
            border-color: rgba(0, 255, 238, 0.3);
        }

        .section-title {
            font-size: 24px;
            color: #cccccc;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .btn {
            background: #9d00ff;
            color: #fff;
            font-weight: bold;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.5);
            box-shadow: 0 8px 25px rgba(157, 0, 255, 0.5);
            margin-right: 12px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: scale(1.3);
            box-shadow: 0 15px 40px rgba(0, 255, 238, 0.8);
            background: #00ffee;
            color: #000;
        }

        .btn:active {
            transform: scale(0.85);
            box-shadow: 0 5px 15px rgba(255, 0, 140, 0.6);
        }

        .show-box {
            margin-top: 30px;
            padding: 25px;
            min-height: 100px;
            border-radius: 15px;
            background: rgba(20, 20, 20, 0.8);
            font-size: 17px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .show-box:hover {
            background: rgba(15, 15, 15, 1);
            border-color: rgba(0, 255, 238, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        #quoteDisplay {
            font-size: 20px;
            line-height: 2;
            color: #ffffff;
        }

        #quoteDisplay span {
            color: #00ffee;
            margin-left: 15px;
            font-style: italic;
            font-weight: bold;
        }

        /* 歌曲名称文字样式 */
        #songName {
            font-size: 22px;
            color: #00ffee;
            margin: 15px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>名言展示器</h1>

    <div class="section">
        <div class="section-title">抽取名言</div>
        <button class="btn" onclick="getRandomQuote()">抽取</button>
        <div id="quoteDisplay" class="show-box"></div>
    </div>

    <div class="section">
        <div class="section-title">抽取音乐</div>
        <button class="btn" onclick="getRandomMusic()">抽取音乐</button>
        <!-- 显示歌曲名称 -->
        <div id="songName">暂未抽取歌曲</div>
        <button class="btn" onclick="playAudio()">播放</button>
        <button class="btn" onclick="pauseAudio()">暂停</button>
    </div>

            { name: "天天向上", url: "https://er-sycdn.kuwo.cn/2549cb30ef5e22e7c56736dd411345f3/69f36d65/resource/30106/trackmedia/M500001MpOHb1Jw7W2.mp3" },

            { name: "追梦赤子心", url: "https://lu-sycdn.kuwo.cn/5434a4e919a12a634eb4aff6809ef25a/69f36ef1/resource/a2/18/72/2183779193.aac" },
            { name: "剑魂", url: "https://lu-sycdn.kuwo.cn/35c27e448d436482b798fd39c54e4b2e/69f36f26/resource/a2/31/33/2381850201.aac" },
            { name: "无名的人", url: "https://er-sycdn.kuwo.cn/836a920c735f80ecd9aea5641aafa87c/69f372bb/resource/30106/trackmedia/M500001hpDLo0H3P7D.mp3" },

        ];

        let lastQuoteIndex = -1;
        let lastMusicIndex = -1;
        const audio = new Audio();

        // 抽取名言 不重复
        function getRandomQuote() {
            let idx;
            do {
                idx = Math.floor(Math.random() * quoteList.length);
            } while (idx === lastQuoteIndex);
            lastQuoteIndex = idx;
            let item = quoteList[idx];
            document.getElementById("quoteDisplay").innerHTML = `"${item.quote}" <span>—— ${item.author}</span>`;
        }

        // 抽取音乐 + 显示歌名 + 防崩溃
        function getRandomMusic() {
            let idx;
            do {
                idx = Math.floor(Math.random() * musicList.length);
            } while (idx === lastMusicIndex);
            lastMusicIndex = idx;

            // 防崩溃处理
            audio.pause();
            audio.src = "";

            let item = musicList[idx];
            audio.src = item.url;
            // 显示歌曲名
            document.getElementById("songName").innerText = "当前歌曲：" + item.name;
        }

        function playAudio() {
            audio.play();
        }
        function pauseAudio() {
            audio.pause();
        }
    </script>
</body>
</html>
