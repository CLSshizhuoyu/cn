<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            line-height: 1.6;
            padding: 50px 20px;
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #00ffee;
            margin-bottom: 50px;
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 238, 0.5));
            animation: glow 2s ease-in-out infinite alternate;
        }

        /* 底部版权声明 */
        .copyright {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-top: 60px;
    padding-bottom: 30px;
    letter-spacing: 1px;
}

        @keyframes glow {
            from { filter: drop-shadow(0 0 8px rgba(0, 255, 238, 0.5)); }
            to { filter: drop-shadow(0 0 15px rgba(0, 255, 238, 0.8)); }
        }

        .section {
            background: rgba(30, 30, 30, 0.9);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .section:hover {
            transform: translateY(-18px);
            box-shadow: 0 25px 50px rgba(0, 255, 238, 0.4);
            border-color: rgba(0, 255, 238, 0.3);
        }

        .section-title {
            font-size: 24px;
            color: #cccccc;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .btn {
            background: #9d00ff;
            color: #fff;
            font-weight: bold;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.5);
            box-shadow: 0 8px 25px rgba(157, 0, 255, 0.5);
            margin-right: 12px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: scale(1.3);
            box-shadow: 0 15px 40px rgba(0, 255, 238, 0.8);
            background: #00ffee;
            color: #000;
        }

        .btn:active {
            transform: scale(0.85);
            box-shadow: 0 5px 15px rgba(255, 0, 140, 0.6);
        }

        .show-box {
            margin-top: 30px;
            padding: 25px;
            min-height: 100px;
            border-radius: 15px;
            background: rgba(20, 20, 20, 0.8);
            font-size: 17px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .show-box:hover {
            background: rgba15, 15, 15, 1);
            border-color: rgba(0, 255, 238, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        #quoteDisplay {
            font-size: 20px;
            line-height: 2;
            color: #ffffff;
        }

        #quoteDisplay span {
            color: #00ffee;
            margin-left: 15px;
            font-style: italic;
            font-weight: bold;
        }

        /* 歌曲名称样式 */
        #songName {
            font-size: 22px;
            color: #00ffee;
            margin: 15px 0;
            font-weight: bold;
        }

        /* 网易云iframe播放器 */
        #musicFrame {
            width: 100%;
            height: 80px;
            border: none;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>Class Nine's CLUB</h1>
    <div class="section">
        <div class="section-title">抽取每日一言</div>
        <button class="btn" onclick="getRandomQuote()">抽取</button>
        <div id="quoteDisplay" class="show-box"></div>
    </div>

    <div class="section">
        <div class="section-title">抽取每日一曲</div>
        <button class="btn" onclick="getRandomMusic()">抽取音乐</button>
        <!-- 显示歌曲名称 -->
        <div id="songName">暂未抽取歌曲</div>
        <iframe id="musicFrame" src=""></iframe>
    </div>

    <div class="copyright"><a href="https://clsshizhuoyu.github.io/cn/list.txt" target="_blank" style="color:#00ffee;text-decoration:none;margin-left:8px;">每日一言、每日一曲内容</a>版权归原作者所有，仅供学习欣赏；<a href="https://music.163.com" target="_blank" style="color:#00ffee;text-decoration:none;margin-left:8px;">音乐</a>仅作演示，不涉及版权声明。</div>
    <script>

    { quote: "今天还是老规矩，我们念一下选择题错了的人，有？！唉？我卷子呢？哦我记了的，找一下", author: "LJ" },

    { quote: "出去不要说是为师教的哈！", author: "LX" },
    { quote: "这道题做错了的你给我站起来！！！！！", author: "X" },

    { quote: "晚自习在教室里吃辣条的都是出生", author: "X" },
    { quote: "莽子些", author: "X" },

    { quote: "拿上你心爱的橡皮擦，我擦擦擦擦擦擦擦", author: "X" }
];

        // 音乐列表：只填 名称 + 网易云歌曲ID
        // 格式 {name:"歌曲名", id:纯数字ID}
        const musicList = [
            { name: "Creep", id: 2639974848 },
            { name: "快乐小马", id: 3349097717 },
            { name: "New Romantics", id: 543077473 },
            { name: "半生雪", id: 3339210692},
            { name: "Wake", id: 2044457707 },
            { name: "Shape of You", id: 3325425196 },
            { name: "Rumors", id: 3320930952 },
            { name: "少年·行", id: 1410840482 },
            { name: "天天向上", id: 2106426554 },
            { name: "十年", id: 1467536356 },
            { name: "TAKE IT OFF", id: 2012279904 },
            { name: "My Stupid Heart", id: 2105087382 },
            { name: "Catch My Breath", id: 26226510 },
            { name: "追梦赤子心", id: 29932183 },
            { name: "แลกเลยปะ (Hoo Whee Hoo)", id: 1940022973 },
            { name: "打上花火", id: 524149974 },
            { name: "灯火里的中国", id: 1837528900 },
            { name: "重庆得行", id: 1975847012 },
            { name: "太阳", id: 460112012 },
            { name: "绝配", id: 2025953071 },
            { name: "I Just Wanna Run", id: 3361255757 },
            { name: "A little story", id: 1479543416 },
            { name: "Reality", id: 32835377 },
            { name: "Hello Summer",id: 424477211 },
            { name: "向上吧！少年", id: 1952790752 }
        ];


        let lastQuoteIndex = -1;
        let lastMusicIndex = -1;

        // 抽取名言 绝不重复
        function getRandomQuote() {
            let idx;
            do {
                idx = Math.floor(Math.random() * quoteList.length);
            } while (idx === lastQuoteIndex);
            lastQuoteIndex = idx;
            let item = quoteList[idx];
            document.getElementById("quoteDisplay").innerHTML = `"${item.quote}" <span>—— ${item.author}</span>`;
        }

        // 抽取音乐：显示歌名 + 自动拼接网易云iframe
        function getRandomMusic() {
            let idx;
            do {
                idx = Math.floor(Math.random() * musicList.length);
            } while (idx === lastMusicIndex);
            lastMusicIndex = idx;

            let item = musicList[idx];
            // 拼接你指定的固定iframe链接
            let iframeUrl = `https://music.163.com/outchain/player?type=2&id=${item.id}&auto=1&height=66`;
            
            // 显示歌曲名 + 加载播放器
            document.getElementById("songName").innerText = "当前歌曲：" + item.name;
            document.getElementById("musicFrame").src = iframeUrl;
        }
    </script>
</body>
</html>
